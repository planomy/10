<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ten-Week Three-Tier Writing Lab</title>
  <style>
    :root {
      --ink: #f7f9ff;
      --muted: #b9c2dd;
      --panel: rgba(13, 18, 38, 0.86);
      --panel-strong: rgba(7, 11, 26, 0.96);
      --line: rgba(255,255,255,0.14);
      --glow: 0 18px 55px rgba(0,0,0,.35);
      --tier1: #50e3c2;
      --tier2: #7f9cff;
      --tier3: #ff78b9;
      --week1: #50e3c2;
      --week2: #7f9cff;
      --week3: #ff78b9;
      --accent: #ffd166;
      --danger: #ff6b6b;
      --success: #75f2a7;
      --radius: 22px;
      --tier-scale: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 15%, color-mix(in srgb, var(--week1) 22%, transparent), transparent 26%),
        radial-gradient(circle at 83% 18%, color-mix(in srgb, var(--week3) 20%, transparent), transparent 24%),
        radial-gradient(circle at 50% 90%, color-mix(in srgb, var(--week2) 22%, transparent), transparent 32%),
        linear-gradient(145deg, #07101f 0%, #0d1227 45%, #10142e 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .34;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
    }

    button, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 12px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(5, 9, 22, .66);
      backdrop-filter: blur(18px);
      box-shadow: var(--glow);
    }

    .left-tools, .right-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .right-tools { justify-content: flex-end; }

    .brand {
      text-align: center;
      line-height: 1;
      white-space: nowrap;
    }

    .brand strong {
      display: block;
      font-size: clamp(1rem, 1.35vw, 1.45rem);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .brand span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }



    .week-control {
      display: grid;
      grid-template-columns: 34px minmax(170px, 1fr) 34px;
      align-items: center;
      gap: 6px;
      min-width: min(340px, 34vw);
    }

    .week-nav {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      padding: 0;
      border-radius: 11px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: rgba(255,255,255,.07);
      font-weight: 950;
      font-size: 1.15rem;
    }

    .week-select-wrap {
      position: relative;
      min-width: 0;
    }

    .week-select {
      width: 100%;
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.07);
      color: var(--ink);
      padding: 8px 30px 8px 11px;
      font-weight: 900;
      letter-spacing: .02em;
      text-align: center;
      cursor: pointer;
    }

    .week-select option { color: #11152b; background: #fff; }
    .week-select-wrap::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--accent);
      font-size: .8rem;
    }

    .week-mini {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: .67rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }

    .control {
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.07);
      color: var(--ink);
      padding: 10px 13px;
      font-weight: 800;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .control:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.25);
    }

    .control.primary {
      background: linear-gradient(135deg, #ffd166, #ff9f43);
      color: #201407;
      border: 0;
    }

    .control.danger {
      background: rgba(255, 107, 107, .12);
      border-color: rgba(255, 107, 107, .34);
    }

    .activity-count {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border-radius: 13px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: .86rem;
      font-weight: 800;
    }

    .activity-count b { color: var(--ink); }

    .timer {
      min-width: 118px;
      text-align: center;
      padding: 8px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      font-size: clamp(1.15rem, 2vw, 1.75rem);
      font-weight: 950;
      letter-spacing: .08em;
      font-variant-numeric: tabular-nums;
    }

    .timer.warning {
      color: #1a1200;
      background: var(--accent);
      box-shadow: 0 0 30px rgba(255,209,102,.32);
    }

    .timer.finished {
      color: white;
      background: var(--danger);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse { 50% { transform: scale(1.04); } }

    .stage {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }

    .mission-strip {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(90deg, rgba(255,255,255,.07), rgba(255,255,255,.025));
      box-shadow: var(--glow);
    }

    .mission-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      font-size: 1.75rem;
      background: linear-gradient(145deg, rgba(255,209,102,.25), rgba(255,159,67,.1));
      border: 1px solid rgba(255,209,102,.35);
    }

    .mission-copy h1 {
      margin: 0;
      font-size: clamp(1.05rem, 1.8vw, 1.7rem);
      line-height: 1.08;
    }

    .mission-copy p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: clamp(.84rem, 1.1vw, 1rem);
      line-height: 1.25;
    }

    .focus-chips {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 42vw;
    }

    .chip {
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      color: #eef2ff;
      font-size: clamp(.72rem, .88vw, .86rem);
      font-weight: 800;
      white-space: nowrap;
    }

    .tiers {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .tier {
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--glow);
      isolation: isolate;
    }

    .tier::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: .22;
      background:
        radial-gradient(circle at top right, var(--tier-colour), transparent 38%),
        linear-gradient(155deg, rgba(255,255,255,.06), transparent 36%);
    }

    .tier[data-tier="1"] { --tier-colour: var(--tier1); }
    .tier[data-tier="2"] { --tier-colour: var(--tier2); }
    .tier[data-tier="3"] { --tier-colour: var(--tier3); }

    .tier-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,.12);
    }

    .tier-label {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 950;
      font-size: clamp(1rem, 1.35vw, 1.4rem);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .tier-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--tier-colour);
      box-shadow: 0 0 18px var(--tier-colour);
    }

    .tier-tag {
      color: var(--muted);
      font-size: clamp(.7rem, .82vw, .82rem);
      font-weight: 800;
      text-align: right;
    }

    .challenge {
      min-height: 0;
      overflow-y: auto;
      padding: 16px 17px 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.25) transparent;
    }

    .challenge::-webkit-scrollbar { width: 8px; }
    .challenge::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 99px; }

    .challenge p {
      margin: 0;
      font-size: calc(clamp(1rem, 1.35vw, 1.38rem) * var(--tier-scale, 1));
      line-height: 1.42;
      font-weight: 680;
      letter-spacing: .005em;
    }

    .challenge .must {
      margin-top: 14px;
      padding: 11px 12px;
      border-left: 4px solid var(--tier-colour);
      border-radius: 10px;
      background: rgba(255,255,255,.055);
      font-size: calc(clamp(.86rem, 1.05vw, 1rem) * var(--tier-scale, 1));
      line-height: 1.35;
      color: #edf1ff;
    }

    .support {
      margin-top: 12px;
      padding: 10px 11px 11px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 13px;
      background: rgba(0,0,0,.16);
    }

    .support-heading {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
      color: var(--tier-colour);
      font-size: calc(clamp(.72rem, .82vw, .82rem) * var(--tier-scale, 1));
      font-weight: 950;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .support-heading::before {
      content: "✦";
      font-size: .9rem;
    }

    .starter-list {
      display: grid;
      gap: 4px;
    }

    .starter-item {
      position: relative;
      padding-left: 15px;
      color: #f7f9ff;
      font-size: calc(clamp(.79rem, .94vw, .94rem) * var(--tier-scale, 1));
      line-height: 1.28;
      font-weight: 700;
    }

    .starter-item::before {
      content: "›";
      position: absolute;
      left: 1px;
      color: var(--tier-colour);
      font-weight: 950;
    }

    .word-banks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 9px;
    }

    .word-bank {
      min-width: 0;
      padding: 7px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,.055);
    }

    .bank-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: calc(clamp(.62rem, .7vw, .7rem) * var(--tier-scale, 1));
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .bank-words {
      color: var(--ink);
      font-size: calc(clamp(.74rem, .84vw, .84rem) * var(--tier-scale, 1));
      line-height: 1.3;
      font-weight: 800;
    }

    .font-resizer {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border-radius: 13px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
    }

    .font-resizer__label {
      min-width: 3.1rem;
      text-align: center;
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: .04em;
      color: var(--muted);
    }

    .font-resizer .control {
      min-width: 2.35rem;
      padding: 8px 10px;
      font-size: 1rem;
      line-height: 1;
    }

    .font-resizer .control:disabled {
      opacity: .4;
      cursor: default;
      transform: none;
    }

    .tier-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 13px 11px;
      color: var(--muted);
      font-size: clamp(.72rem, .82vw, .82rem);
      font-weight: 800;
      border-top: 1px solid var(--line);
      background: rgba(0,0,0,.11);
    }

    .word-target {
      color: var(--ink);
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.11);
    }

    .model-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-strong);
      box-shadow: var(--glow);
      overflow: hidden;
      transition: max-height .35s ease;
    }

    .model-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      border: 0;
      background: linear-gradient(90deg, rgba(127,156,255,.14), rgba(255,120,185,.08));
      color: var(--ink);
      padding: 10px 14px;
      text-align: left;
    }

    .model-toggle strong {
      font-size: clamp(.95rem, 1.15vw, 1.15rem);
    }

    .model-toggle span {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 750;
    }

    .model-arrow {
      font-size: 1.2rem;
      transition: transform .25s ease;
    }

    .model-panel.open .model-arrow { transform: rotate(180deg); }

    .model-body {
      display: none;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 12px;
      padding: 12px;
      border-top: 1px solid var(--line);
    }

    .model-panel.open .model-body { display: grid; }

    .model-area {
      min-height: 180px;
      width: 100%;
      resize: vertical;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 15px;
      outline: none;
      padding: 14px;
      background: rgba(255,255,255,.06);
      color: white;
      font-size: clamp(1rem, 1.35vw, 1.35rem);
      line-height: 1.5;
    }

    .model-area:focus {
      border-color: rgba(127,156,255,.75);
      box-shadow: 0 0 0 4px rgba(127,156,255,.12);
    }

    .model-prompts {
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .model-prompts button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 11px;
      color: var(--ink);
      background: rgba(255,255,255,.06);
      text-align: left;
      font-size: .84rem;
      font-weight: 800;
    }

    .model-prompts button:hover { background: rgba(255,255,255,.11); }

    .progress {
      position: fixed;
      left: 0;
      bottom: 0;
      height: 4px;
      width: 0;
      z-index: 50;
      background: linear-gradient(90deg, var(--tier1), var(--tier2), var(--tier3), var(--accent));
      box-shadow: 0 0 18px rgba(127,156,255,.7);
      transition: width .4s ease;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      z-index: 70;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      padding: 11px 16px;
      border-radius: 999px;
      background: #f8f9ff;
      color: #11152b;
      font-weight: 900;
      box-shadow: var(--glow);
      transition: .25s ease;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    body.compact .challenge p { font-size: calc(clamp(.92rem, 1.15vw, 1.18rem) * var(--tier-scale, 1)); }
    body.compact .challenge .must { font-size: calc(clamp(.8rem, .94vw, .92rem) * var(--tier-scale, 1)); }
    body.compact .support { padding: 8px 9px; margin-top: 8px; }
    body.compact .starter-item { font-size: calc(clamp(.72rem, .82vw, .82rem) * var(--tier-scale, 1)); }
    body.compact .bank-words { font-size: calc(clamp(.68rem, .75vw, .76rem) * var(--tier-scale, 1)); }
    body.compact .tier-head { padding-block: 9px 8px; }
    body.compact .mission-strip { padding-block: 7px; }

    body.high-contrast {
      --panel: rgba(0, 0, 0, .94);
      --panel-strong: #000;
      --line: rgba(255,255,255,.42);
      --muted: #eef1ff;
      background: #000;
    }

    @media (max-width: 1050px) {
      .topbar { grid-template-columns: 1fr auto; }
      .brand { display: block; }
      .week-control { min-width: 240px; }
      .mission-strip { grid-template-columns: auto 1fr; }
      .focus-chips { grid-column: 1 / -1; max-width: none; justify-content: flex-start; }
      .challenge p { font-size: calc(clamp(.95rem, 1.45vw, 1.18rem) * var(--tier-scale, 1)); }
    }

    @media (max-width: 760px) {
      .app { padding: 8px; }
      .tiers { grid-template-columns: 1fr; }
      .model-body { grid-template-columns: 1fr; }
      .topbar { grid-template-columns: 1fr; }
      .week-control { min-width: min(100%, 360px); margin: 0 auto; }
      .right-tools, .left-tools { justify-content: center; }
    }

    @media (max-height: 780px) and (min-width: 761px) {
      .app { gap: 8px; padding: 8px; }
      .topbar { min-height: 50px; padding: 5px 9px; }
      .mission-strip { padding: 7px 11px; }
      .mission-icon { width: 40px; height: 40px; font-size: 1.4rem; }
      .challenge { padding: 11px 13px 8px; }
      .challenge p { font-size: clamp(.9rem, 1.14vw, 1.12rem); line-height: 1.34; }
      .challenge .must { margin-top: 9px; padding: 8px 10px; }
      .support { margin-top: 8px; padding: 8px 9px; }
      .support-heading { margin-bottom: 5px; }
      .starter-list { gap: 2px; }
      .starter-item { font-size: clamp(.7rem, .77vw, .78rem); line-height: 1.22; }
      .word-banks { margin-top: 6px; gap: 5px; }
      .word-bank { padding: 5px 6px; }
      .bank-words { font-size: clamp(.65rem, .7vw, .72rem); }
      .tier-foot { padding-block: 6px 7px; }
      .model-toggle { padding: 7px 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="left-tools">
        <button class="control" id="prevBtn" title="Previous activity">◀</button>
        <div class="activity-count">Challenge <b id="activityNumber">1</b> / 8</div>
        <button class="control" id="nextBtn" title="Next activity">▶</button>
        <button class="control" id="shuffleBtn" title="Choose a random challenge">⤨ Random</button>
        <div class="font-resizer" role="group" aria-label="Tier text size">
          <button type="button" class="control" id="fontSmaller" title="Smaller tier text">A−</button>
          <span class="font-resizer__label" id="fontSizeLabel">100%</span>
          <button type="button" class="control" id="fontBigger" title="Bigger tier text">A+</button>
        </div>
      </div>

      <div class="brand week-control">
        <button class="week-nav" id="prevWeekBtn" title="Previous week">‹</button>
        <div class="week-select-wrap">
          <select class="week-select" id="weekSelect" aria-label="Choose week"></select>
          <span class="week-mini" id="weekMini">Week 1 of 10</span>
        </div>
        <button class="week-nav" id="nextWeekBtn" title="Next week">›</button>
      </div>

      <div class="right-tools">
        <div class="timer" id="timer">05:00</div>
        <button class="control" id="timerBtn">Start</button>
        <button class="control danger" id="resetBtn">Reset</button>
        <button class="control" id="compactBtn">Fit</button>
        <button class="control primary" id="presentBtn">⛶ Present</button>
      </div>
    </header>

    <main class="stage">
      <section class="mission-strip">
        <div class="mission-icon" id="missionIcon">⚡</div>
        <div class="mission-copy">
          <h1 id="missionTitle">Instant Atmosphere</h1>
          <p id="missionBrief">Create a setting that feels alive before anything dramatic happens.</p>
        </div>
        <div class="focus-chips" id="focusChips"></div>
      </section>

      <section class="tiers">
        <article class="tier" data-tier="1">
          <div class="tier-head">
            <div class="tier-label"><span class="tier-dot"></span>Tier 1</div>
            <div class="tier-tag" id="tier1Mode">Narrative</div>
          </div>
          <div class="challenge">
            <p id="tier1Prompt"></p>
            <div class="must" id="tier1Must"></div>
            <div class="support" id="tier1Support"></div>
          </div>
          <div class="tier-foot">
            <span id="tier1Goal">Build clear detail</span>
            <span class="word-target" id="tier1Target">4–6 sentences</span>
          </div>
        </article>

        <article class="tier" data-tier="2">
          <div class="tier-head">
            <div class="tier-label"><span class="tier-dot"></span>Tier 2</div>
            <div class="tier-tag" id="tier2Mode">Narrative</div>
          </div>
          <div class="challenge">
            <p id="tier2Prompt"></p>
            <div class="must" id="tier2Must"></div>
            <div class="support" id="tier2Support"></div>
          </div>

    let currentWeek = 0;
    let activities = weeks[currentWeek].activities;
    let current = 0;
    let seconds = 300;
    let timerId = null;
    let running = false;

    const TIER_SCALES = [1, 1.15, 1.3, 1.5, 1.75, 2];
    const TIER_SCALE_KEY = "writingLabTierScale";
    let tierScaleIndex = 0;

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
    const toast = $("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timeout);
      showToast.timeout = setTimeout(() => toast.classList.remove("show"), 1300);
    }

    function populateWeekSelect() {
      $("weekSelect").innerHTML = weeks.map((week, index) =>
        `<option value="${index}">W${index + 1} · ${escapeHtml(week.title)}</option>`
      ).join("");
      $("weekSelect").value = currentWeek;
    }

    function applyWeekTheme() {
      const week = weeks[currentWeek];
      document.documentElement.style.setProperty("--week1", week.palette[0]);
      document.documentElement.style.setProperty("--week2", week.palette[1]);
      document.documentElement.style.setProperty("--week3", week.palette[2]);
      $("weekMini").textContent = `Week ${currentWeek + 1} of ${weeks.length}`;
      document.title = `Week ${currentWeek + 1}: ${week.title} | Three-Tier Writing Lab`;
    }

    function saveModel() {
      try { localStorage.setItem(`writingLabModel-${currentWeek}`, $("modelArea").value); } catch (_) {}
    }

    function loadModel() {
      try { $("modelArea").value = localStorage.getItem(`writingLabModel-${currentWeek}`) || ""; } catch (_) { $("modelArea").value = ""; }
    }

    function setWeek(index, notify = true) {
      saveModel();
      currentWeek = (index + weeks.length) % weeks.length;
      activities = weeks[currentWeek].activities;
      current = 0;
      $("weekSelect").value = currentWeek;
      applyWeekTheme();
      loadModel();
      renderActivity();
      if (notify) showToast(`Week ${currentWeek + 1}: ${weeks[currentWeek].title}`);
    }

    function changeWeek(delta) {
      setWeek(currentWeek + delta);
    }

    function renderActivity() {
      const item = activities[current];
      $("activityNumber").textContent = current + 1;
      $("missionIcon").textContent = item.icon;
      $("missionTitle").textContent = item.title;
      $("missionBrief").textContent = item.brief;
      $("focusChips").innerHTML = item.focus.map(x => `<span class="chip">${x}</span>`).join("");

      item.tiers.forEach((tier, i) => {
        const n = i + 1;
        $(`tier${n}Mode`).textContent = tier.mode;
        $(`tier${n}Prompt`).textContent = tier.prompt;
        $(`tier${n}Must`).innerHTML = `<strong>Must include:</strong> ${tier.must}`;
        const support = $(`tier${n}Support`);
        support.innerHTML = `
          <div class="support-heading">Launch Pad</div>
          <div class="starter-list">
            ${tier.starters.map(starter => `<div class="starter-item">${escapeHtml(starter)}</div>`).join("")}
          </div>
          <div class="word-banks">
            <div class="word-bank">
              <span class="bank-label">Strong verbs</span>
              <div class="bank-words">${tier.verbs.map(escapeHtml).join(" · ")}</div>
            </div>
            <div class="word-bank">
              <span class="bank-label">${escapeHtml(tier.wordLabel || "Precise adjectives")}</span>
              <div class="bank-words">${tier.adjectives.map(escapeHtml).join(" · ")}</div>
            </div>
          </div>
        `;
        $(`tier${n}Goal`).textContent = tier.goal;
        $(`tier${n}Target`).textContent = tier.target;
      });

      $("progress").style.width = `${((current + 1) / activities.length) * 100}%`;
      resetTimer(false);
      document.querySelectorAll(".challenge").forEach(el => el.scrollTop = 0);
    }

    function changeActivity(delta) {
      current = (current + delta + activities.length) % activities.length;
      renderActivity();
      showToast(`Challenge ${current + 1}`);
    }

    function randomActivity() {
      let next = current;
      while (next === current && activities.length > 1) {
        next = Math.floor(Math.random() * activities.length);
      }
      current = next;
      renderActivity();
      showToast("Random challenge loaded");
    }

    function updateTimer() {
      const mins = Math.floor(seconds / 60).toString().padStart(2, "0");
      const secs = (seconds % 60).toString().padStart(2, "0");
      const timer = $("timer");
      timer.textContent = `${mins}:${secs}`;
      timer.classList.toggle("warning", seconds <= 60 && seconds > 0);
      timer.classList.toggle("finished", seconds === 0);
    }

    function toggleTimer() {
      if (seconds === 0) resetTimer(false);
      running = !running;
      $("timerBtn").textContent = running ? "Pause" : "Start";
      if (running) {
        timerId = setInterval(() => {
          seconds--;
          updateTimer();
          if (seconds <= 0) {
            clearInterval(timerId);
            timerId = null;
            running = false;
            $("timerBtn").textContent = "Start";
            showToast("Time — finish the sentence");
          }
        }, 1000);
      } else {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function resetTimer(notify = true) {
      clearInterval(timerId);
      timerId = null;
      running = false;
      seconds = 300;
      $("timerBtn").textContent = "Start";
      updateTimer();
      if (notify) showToast("Timer reset");
    }

    async function present() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          showToast("Presentation mode on");
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        showToast("Chrome blocked fullscreen — press F11");
      }
    }

    function toggleModel() {
      $("modelPanel").classList.toggle("open");
      if ($("modelPanel").classList.contains("open")) {
        setTimeout(() => $("modelArea").focus(), 120);
      }
    }

    function applyTierScale() {
      const scale = TIER_SCALES[tierScaleIndex] || 1;
      document.documentElement.style.setProperty("--tier-scale", String(scale));
      $("fontSizeLabel").textContent = `${Math.round(scale * 100)}%`;
      $("fontSmaller").disabled = tierScaleIndex <= 0;
      $("fontBigger").disabled = tierScaleIndex >= TIER_SCALES.length - 1;
    }

    function bumpTierScale(delta) {
      const next = Math.max(0, Math.min(TIER_SCALES.length - 1, tierScaleIndex + delta));
      if (next === tierScaleIndex) return;
      tierScaleIndex = next;
      try { localStorage.setItem(TIER_SCALE_KEY, String(tierScaleIndex)); } catch (_) {}
      applyTierScale();
      showToast(`Tier text ${Math.round((TIER_SCALES[tierScaleIndex] || 1) * 100)}%`);
    }

    function loadTierScale() {
      try {
        const idx = Number(localStorage.getItem(TIER_SCALE_KEY));
        if (Number.isInteger(idx) && idx >= 0 && idx < TIER_SCALES.length) tierScaleIndex = idx;
      } catch (_) {}
      applyTierScale();
    }

    $("prevWeekBtn").addEventListener("click", () => changeWeek(-1));
    $("nextWeekBtn").addEventListener("click", () => changeWeek(1));
    $("weekSelect").addEventListener("change", (event) => setWeek(Number(event.target.value)));
    $("prevBtn").addEventListener("click", () => changeActivity(-1));
    $("nextBtn").addEventListener("click", () => changeActivity(1));
    $("shuffleBtn").addEventListener("click", randomActivity);
    $("timerBtn").addEventListener("click", toggleTimer);
    $("resetBtn").addEventListener("click", () => resetTimer(true));
    $("presentBtn").addEventListener("click", present);
    $("modelToggle").addEventListener("click", toggleModel);
    $("fontSmaller").addEventListener("click", () => bumpTierScale(-1));
    $("fontBigger").addEventListener("click", () => bumpTierScale(1));
    $("modelArea").addEventListener("input", saveModel);
    $("compactBtn").addEventListener("click", () => {
      document.body.classList.toggle("compact");
      showToast(document.body.classList.contains("compact") ? "Compact fit on" : "Large text restored");
    });
    $("clearModel").addEventListener("click", () => {
      $("modelArea").value = "";
      $("modelArea").focus();
    });

    document.querySelectorAll("[data-insert]").forEach(button => {
      button.addEventListener("click", () => {
        const area = $("modelArea");
        const start = area.selectionStart;
        const end = area.selectionEnd;
        const text = button.dataset.insert;
        area.value = area.value.slice(0, start) + text + area.value.slice(end);
        area.selectionStart = area.selectionEnd = start + text.length;
        area.focus();
      });
    });

    document.addEventListener("keydown", (event) => {
      const typing = document.activeElement === $("modelArea");
      if (typing && !event.ctrlKey && !event.metaKey && event.key !== "Escape") return;

      if (event.key === "ArrowRight") changeActivity(1);
      if (event.key === "ArrowLeft") changeActivity(-1);
      if (event.key === "PageDown") changeWeek(1);
      if (event.key === "PageUp") changeWeek(-1);
      if (event.key === " ") {
        event.preventDefault();
        toggleTimer();
      }
      if (event.key.toLowerCase() === "m") toggleModel();
      if (event.key.toLowerCase() === "f") present();
      if (event.key.toLowerCase() === "r") resetTimer(true);
      if (event.key.toLowerCase() === "h") {
        document.body.classList.toggle("high-contrast");
        showToast("Contrast changed");
      }
      if (event.key === "+" || event.key === "=") bumpTierScale(1);
      if (event.key === "-" || event.key === "_") bumpTierScale(-1);
    });

    document.addEventListener("fullscreenchange", () => {
      $("presentBtn").textContent = document.fullscreenElement ? "✕ Exit" : "⛶ Present";
    });

    populateWeekSelect();
    applyWeekTheme();
    loadTierScale();
    loadModel();
    renderActivity();
  </script>
</body>
</html>
